# Configuración específica para producción
spring.application.name=Documentacion
server.port=80

# Configuración de OpenAPI optimizada para producción
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.config-url=/api-docs/swagger-config
springdoc.swagger-ui.url=/api-docs
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.deep-linking=true
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.doc-expansion=none

# Configuración de logging para producción
logging.level.root=WARN
logging.level.com.banquito.documentacion=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# Configuración de seguridad para producción
spring.security.basic.enabled=false
